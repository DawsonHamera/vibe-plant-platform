name: CI

on:
  workflow_dispatch:

jobs:
  frontend-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install

      - name: Frontend Typecheck
        run: npm run typecheck --workspace @vibe/frontend

      - name: Frontend Lint
        run: npm run lint --workspace @vibe/frontend

      - name: Frontend Build
        run: npm run build --workspace @vibe/frontend

      - name: Upload frontend dist artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/frontend/dist
          if-no-files-found: ignore
