name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run backend migrations
        run: npm run migrate --workspace @vibe/backend

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload frontend dist artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/frontend/dist
          if-no-files-found: ignore

  container-deploy-validate:
    runs-on: ubuntu-latest
    needs: validate
    env:
      PORT: 43000
      FRONTEND_PORT: 48080
      CORS_ORIGINS: http://127.0.0.1:48080
      VITE_API_BASE_URL: http://127.0.0.1:43000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production compose images
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.prod.yml build

      - name: Start production compose stack
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.prod.yml up -d
          sleep 5

      - name: Run production smoke checks
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/ci/compose-smoke-checks.sh
          scripts/ci/compose-smoke-checks.sh "http://127.0.0.1:${PORT}" "http://127.0.0.1:${FRONTEND_PORT}"

      - name: Cleanup compose stack
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.prod.yml down --volumes --remove-orphans
